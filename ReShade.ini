[GENERAL]
EffectSearchPaths=.\reshade-shaders\Shaders
TextureSearchPaths=.\reshade-shaders\Textures
PresetPath=.\NeocronClassic-Quality.ini
PerformanceMode=1
SkipLoadingDisabledEffects=1

; Depth-buffer access. These are ReShade's neutral defaults — the DX11 client
; renders a usable depth buffer (sceneDepth), but its orientation/reversal is not
; yet confirmed under Proton/DXVK. If MXAO looks flat, haloed or inverted, open
; the overlay (Home), add the DisplayDepth effect, and adjust these until the
; depth preview is a clean near=dark/far=light gradient:
;   RESHADE_DEPTH_INPUT_IS_UPSIDE_DOWN=1   (flip if depth is vertically mirrored)
;   RESHADE_DEPTH_INPUT_IS_REVERSED=1      (flip if near/far are swapped)
PreprocessorDefinitions=RESHADE_DEPTH_INPUT_IS_UPSIDE_DOWN=0,RESHADE_DEPTH_INPUT_IS_REVERSED=0,RESHADE_DEPTH_INPUT_IS_LOGARITHMIC=0

[OVERLAY]
TutorialProgress=4

[INPUT]
KeyOverlay=36,0,0,0

[SCREENSHOT]
SavePath=.\reshade-screenshots

[DEPTH]
DepthCopyBeforeClears=1
